<template>
  <view class="container">
    
    <view class="video-header">
      <view class="nav-overlay" :style="{ paddingTop: safeAreaTop + 'px' }">
        <uni-icons type="arrowleft" size="24" color="#fff" @click="goBack"></uni-icons>
        <uni-icons type="more-filled" size="24" color="#fff"></uni-icons>
      </view>
      
      <view class="play-overlay" @click="playVideo">
        <uni-icons type="plusempty" size="50" color="rgba(255,255,255,0.9)" v-if="false"></uni-icons>
        <view class="play-icon-circle">
          <uni-icons type="paperplane-filled" size="24" color="#fff" style="margin-left: 6rpx;"></uni-icons>
        </view>
      </view>
      
      </view>

    <scroll-view scroll-y class="content-scroll">
      
      <view class="info-card">
        <view class="course-tag">诚意班 · 第69期</view>
        <view class="course-title">致良知：让内心充满力量的生命哲学课</view>
        <view class="course-meta">
          <view class="meta-item">
            <uni-icons type="staff-filled" size="14" color="#cbd5e0"></uni-icons>
            <text>52,979 学员</text>
          </view>
          <view class="meta-item">
            <uni-icons type="calendar-filled" size="14" color="#cbd5e0"></uni-icons>
            <text>每日更新</text>
          </view>
        </view>
      </view>

      <view class="tab-container">
        <view 
          class="tab" 
          v-for="(tab, index) in tabs" 
          :key="index"
          :class="{ active: currentTab === index }"
          @click="currentTab = index"
        >
          {{ tab }}
        </view>
      </view>

      <view class="daily-section" v-show="currentTab === 1">
        <view class="date-header">
          <text class="date-title">Day 16 · 深入经义</text>
          <text class="date-sub">进行中</text>
        </view>

        <view class="timeline">
          
          <view 
            class="task-card" 
            v-for="(task, index) in taskList" 
            :key="index"
            :class="{ active: task.status === 'active' }"
            @click="handleTaskClick(task)"
          >
            <view class="task-left">
              <view class="icon-box" :class="task.iconClass">
                <uni-icons :type="task.uniIcon" size="20" :color="task.iconColor"></uni-icons>
              </view>
              <view class="task-info">
                <view class="task-title">{{ task.title }}</view>
                <view class="task-desc">{{ task.desc }}</view>
              </view>
            </view>
            
            <view class="btn-action" :class="{ 'btn-highlight': task.status === 'active' }">
               <uni-icons 
                 v-if="task.status === 'done'" 
                 type="checkmarkempty" 
                 size="18" 
                 color="#0ea5e9"
               ></uni-icons>
               
               <uni-icons 
                 v-else-if="task.status === 'active'" 
                 type="arrowright" 
                 size="18" 
                 color="#fff"
               ></uni-icons>
               
               <uni-icons 
                 v-else 
                 type="locked-filled" 
                 size="16" 
                 color="#cbd5e0"
               ></uni-icons>
            </view>
          </view>

        </view>
      </view>
      
      <view style="height: 120rpx;"></view>

    </scroll-view>

    <view class="fab-btn">
      <uni-icons type="chat-filled" size="18" color="#ff7e5f"></uni-icons>
      <text class="fab-text">进入小组讨论</text>
    </view>

  </view>
</template>

<script setup>
import { ref } from 'vue';

// --- 状态数据 ---
const currentTab = ref(1); // 默认选中第二个 Tab
const tabs = ['课程介绍', '今日学习', '我的数据'];

// 模拟安全区高度 (小程序中可以使用 uni.getSystemInfoSync().safeAreaInsets.top)
const safeAreaTop = ref(44); 

// 任务列表数据
const taskList = ref([
  {
    id: 1,
    title: '原文诵读',
    desc: '《送宗伯乔白岩序》',
    status: 'done', // done, active, lock
    uniIcon: 'map-filled', // 图标名
    iconClass: 'icon-read',
    iconColor: '#0ea5e9'
  },
  {
    id: 2,
    title: '名师导读',
    desc: '博仁老师 · 15分钟深度解析',
    status: 'active',
    uniIcon: 'videocam-filled',
    iconClass: 'icon-video',
    iconColor: '#f97316'
  },
  {
    id: 3,
    title: '心得打卡',
    desc: '分享今日感悟，获20积分',
    status: 'lock',
    uniIcon: 'compose',
    iconClass: 'icon-work',
    iconColor: '#22c55e'
  }
]);

// --- 方法 ---
const goBack = () => {
  uni.navigateBack();
};

const playVideo = () => {
  uni.showToast({ title: '开始播放', icon: 'none' });
};

const handleTaskClick = (task) => {
  if (task.status === 'lock') {
    uni.showToast({ title: '请先完成前置任务', icon: 'none' });
  } else {
    uni.showToast({ title: `进入: ${task.title}`, icon: 'none' });
  }
};
</script>

<style scoped>
/* --- 变量定义 (模仿 CSS Variables) --- */
/* 注意：UniApp 的 scoped 样式中，建议直接写颜色值，或使用全局样式文件 */
/* 为了保持原设计，这里手动替换颜色变量 */

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background-color: #eef1f5;
  overflow: hidden;
}

/* --- 1. 视频区 --- */
.video-header {
  position: relative;
  width: 100%;
  height: 420rpx; /* 约 210px */
  background: #000;
  z-index: 10;
  flex-shrink: 0;
}

.nav-overlay {
  position: absolute; 
  top: 0; 
  left: 0; 
  width: 100%;
  padding: 0 30rpx 20rpx;
  box-sizing: border-box;
  display: flex; 
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
  z-index: 20;
}

.play-overlay {
  width: 100%; 
  height: 100%;
  display: flex; 
  align-items: center; 
  justify-content: center;
}

.play-icon-circle {
  width: 100rpx;
  height: 100rpx;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2rpx solid rgba(255,255,255,0.4);
}

/* --- 2. 滚动内容区 --- */
.content-scroll {
  flex: 1;
  background: linear-gradient(to bottom, #fff 0%, #f9f9f9 100%);
  border-radius: 48rpx 48rpx 0 0; /* 圆角移植 */
  margin-top: -30rpx; /* 负边距覆盖 */
  position: relative;
  z-index: 11;
  overflow: hidden;
}

/* 课程信息 */
.info-card {
  padding: 48rpx 40rpx 20rpx;
}

.course-tag {
  background: rgba(255, 126, 95, 0.1); 
  color: #ff7e5f;
  font-size: 20rpx; 
  font-weight: bold; 
  padding: 8rpx 16rpx; 
  border-radius: 8rpx;
  display: inline-block; 
  margin-bottom: 16rpx;
}

.course-title {
  font-size: 36rpx; 
  font-weight: 700; 
  color: #2c3e50;
  margin-bottom: 16rpx; 
  line-height: 1.4;
}

.course-meta {
  display: flex; 
  align-items: center; 
  gap: 30rpx;
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 8rpx;
}

.meta-item text {
  font-size: 24rpx; 
  color: #95a5a6;
}

/* Tab 切换 */
.tab-container {
  display: flex;
  padding: 0 40rpx;
  margin-top: 30rpx;
  border-bottom: 1px solid rgba(0,0,0,0.03);
}

.tab {
  margin-right: 50rpx;
  padding-bottom: 20rpx;
  font-size: 28rpx;
  color: #95a5a6;
  position: relative;
  transition: all 0.3s;
}

.tab.active {
  color: #2c3e50;
  font-weight: 600;
  font-size: 30rpx;
}

.tab.active::after {
  content: ''; 
  position: absolute; 
  bottom: -2rpx; 
  left: 0; 
  right: 0;
  height: 6rpx; 
  background: linear-gradient(135deg, #ff7e5f, #feb47b); 
  border-radius: 6rpx;
}

/* 每日任务 */
.daily-section { 
  padding: 40rpx; 
}

.date-header {
  display: flex; 
  justify-content: space-between; 
  align-items: center;
  margin-bottom: 40rpx;
}

.date-title { 
  font-size: 32rpx; 
  font-weight: 700; 
  color: #2c3e50; 
}

.date-sub { 
  font-size: 24rpx; 
  color: #ff7e5f; 
  background: #fff0eb; 
  padding: 8rpx 20rpx; 
  border-radius: 40rpx; 
}

/* 时间轴 */
.timeline { 
  position: relative; 
  padding-left: 30rpx; 
}

.timeline::before {
  content: ''; 
  position: absolute; 
  left: 12rpx; 
  top: 20rpx; 
  bottom: 20rpx;
  width: 4rpx; 
  background: #f0f0f0; 
  border-radius: 4rpx;
}

.task-card {
  position: relative;
  background: #ffffff;
  border-radius: 32rpx;
  padding: 32rpx;
  margin-bottom: 32rpx;
  box-shadow: 0 20rpx 40rpx rgba(0,0,0,0.03);
  display: flex; 
  align-items: center; 
  justify-content: space-between;
  border: 1px solid rgba(0,0,0,0.01);
}

.task-card:active {
  background-color: #f9f9f9;
}

/* 时间点 */
.task-card::before {
  content: ''; 
  position: absolute; 
  left: -48rpx; 
  top: 50%; 
  transform: translateY(-50%);
  width: 20rpx; 
  height: 20rpx; 
  border-radius: 50%;
  background: #fff; 
  border: 4rpx solid #e0e0e0; 
  z-index: 2;
}

.task-card.active::before {
  border-color: #ff7e5f; 
  background: #ff7e5f; 
  box-shadow: 0 0 0 6rpx rgba(255, 126, 95, 0.2);
}

.task-left { 
  display: flex; 
  align-items: center; 
  gap: 24rpx; 
}

.icon-box {
  width: 80rpx; 
  height: 80rpx; 
  border-radius: 24rpx;
  display: flex; 
  align-items: center; 
  justify-content: center;
}

/* 图标背景色 */
.icon-read { background: #e0f2fe; }
.icon-video { background: #ffedd5; }
.icon-work { background: #dcfce7; }

.task-info {
  display: flex;
  flex-direction: column;
}

.task-title {
  font-size: 28rpx; 
  color: #2c3e50; 
  font-weight: 600; 
  margin-bottom: 6rpx;
}

.task-desc {
  font-size: 22rpx; 
  color: #95a5a6;
}

.btn-action {
  width: 64rpx; 
  height: 64rpx; 
  border-radius: 50%;
  background: #f8f9fa;
  display: flex; 
  align-items: center; 
  justify-content: center;
}

.btn-highlight {
  background: linear-gradient(135deg, #ff7e5f, #feb47b);
  box-shadow: 0 8rpx 20rpx rgba(255, 126, 95, 0.3);
}

/* --- 3. 悬浮 FAB --- */
.fab-btn {
  position: absolute; 
  bottom: 60rpx; 
  left: 50%; 
  transform: translateX(-50%);
  background: #fff;
  padding: 20rpx 48rpx;
  border-radius: 60rpx;
  box-shadow: 0 30rpx 60rpx rgba(255, 126, 95, 0.2);
  display: flex; 
  align-items: center; 
  gap: 16rpx;
  z-index: 20; 
  border: 1px solid rgba(255, 126, 95, 0.1);
}

.fab-text {
  color: #ff7e5f; 
  font-weight: 600; 
  font-size: 28rpx;
}
</style>
